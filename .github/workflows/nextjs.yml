name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lc-metal-website # 设置默认工作目录
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # 注意：由于没有 lock 文件，移除了自动缓存配置以避免报错

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        # 使用 npm install 因为没有 lock 文件，ci 命令会失效
        run: npm install

      - name: Build with Next.js
        run: npx next build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Next.js 静态导出默认生成 'out' 文件夹，请确认你 next.config.js 中配置了 output: 'export'
          path: lc-metal-website/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
