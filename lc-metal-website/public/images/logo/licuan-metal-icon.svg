<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" aria-label="力川金属 Icon" role="img">
  <defs>
    <linearGradient id="iconMetalGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8ebf0"/>
      <stop offset="40%" stop-color="#c7ccd2"/>
      <stop offset="100%" stop-color="#7a858d"/>
    </linearGradient>
  </defs>
  <!-- 外部六边形轮廓，契合 Logo 的金属感 -->
  <polygon points="64,8 110,28 110,100 64,120 18,100 18,28"
           fill="url(#iconMetalGrad)" stroke="#6b7280" stroke-width="2"/>
  <!-- 内部三竖条（川的抽象符号） -->
  <g fill="#ffffff" stroke="#4b5563" stroke-width="1.5" opacity="0.95">
    <rect x="44" y="34" width="8" height="60" rx="2"/>
    <rect x="60" y="34" width="8" height="60" rx="2"/>
    <rect x="76" y="34" width="8" height="60" rx="2"/>
  </g>
  <!-- 简单符号周边微光，保持清晰在小尺寸 -->
  <circle cx="64" cy="64" r="4" fill="#ffffff" opacity="0.25"/>
</svg>